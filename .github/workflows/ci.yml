name: CI Pipeline

on:
  push:
    branches:
      - main

  workflow_dispatch:

  schedule:
    - cron: '0 11 * * *'

jobs:
  tests:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        run: npm test